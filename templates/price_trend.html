{% extends 'base.html' %}

{% block content %}
<div class="row mb-4 align-items-center">
  <div class="col-12 col-md-6">
    <h2 class="mb-0 text-white font-weight-bold">
      <i class="bi bi-graph-up text-primary me-2"></i> Price Trend Analysis
    </h2>
    <p class="text-muted mb-0">Visualize price and margin history across sales and purchases.</p>
  </div>
</div>

<div class="card shadow-lg border-0 bg-dark-subtle mb-4" style="background: rgba(255,255,255,0.03);">
  <div class="card-body p-4">
    <form id="filterForm" class="row g-3">
      <div class="col-12 col-md-3">
        <label class="form-label text-light small fw-bold">TRANSACTION TYPE</label>
        <select class="form-select" name="txn_type" id="txn_type">
          <option value="all">Show All (Compare)</option>
          <option value="sale">Sales Only</option>
          <option value="purchase">Purchases Only</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label text-light small fw-bold">SELECT PRODUCT</label>
        <select class="form-select select2" name="product_id" id="product_id" required>
          <option value="">-- Search Product --</option>
          {% for p in products %}
          <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label text-light small fw-bold">CLIENT (FOR SALES)</label>
        <select class="form-select select2" name="client_id" id="client_id">
          <option value="">-- All Clients --</option>
          {% for c in clients %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label text-light small fw-bold">VENDOR (FOR PURCHASES)</label>
        <select class="form-select select2" name="vendor_name" id="vendor_name">
          <option value="">-- All Vendors --</option>
          {% for v in vendors %}
          <option value="{{ v }}">{{ v }}</option>
          {% endfor %}
        </select>
      </div>
    </form>
  </div>
</div>

<div class="card shadow-lg border-0 bg-dark p-3" id="chartContainer" style="display: none; min-height: 400px; background: #1a1f26;">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="card-title text-white mb-0" id="productTitle">Product Trend</h5>
        <div id="typeBadge">
            <!-- Dynamic Badge -->
        </div>
    </div>
    <div style="position: relative; height:60vh; width:100%">
      <canvas id="priceChart"></canvas>
    </div>
  </div>
</div>

<div id="noData" class="text-center py-5" style="display: none;">
    <i class="bi bi-bar-chart text-muted display-1"></i>
    <h4 class="text-muted mt-3">No data found for selected criteria</h4>
</div>

<div id="loading" class="text-center py-5" style="display: none;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <h5 class="text-light mt-3">Fetching price history...</h5>
</div>

{% endblock %}

{% block scripts %}
<!-- Load date-fns adapter for Chart.js time scale -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<script>
$(document).ready(function() {
    $('.select2').select2({
        theme: 'bootstrap-5',
        width: '100%'
    });

    let priceChart = null;

    function updateChart() {
        const productId = $('#product_id').val();
        if (!productId) {
            $('#chartContainer').hide();
            $('#noData').hide();
            return;
        }

        const clientId = $('#client_id').val();
        const vendorName = $('#vendor_name').val();

        $('#loading').show();
        $('#chartContainer').hide();
        $('#noData').hide();

        const txnType = $('#txn_type').val();
        const url = `/api/reports/price-history?product_id=${productId}&client_id=${clientId}&vendor_name=${encodeURIComponent(vendorName)}`;
        
        fetch(url)
            .then(res => res.json())
            .then(data => {
                $('#loading').hide();
                
                // Filter by type
                const filteredData = txnType === 'all' ? data : data.filter(d => d.type === txnType);

                if (!filteredData || filteredData.length === 0) {
                    $('#noData').show();
                    return;
                }

                $('#chartContainer').show();
                $('#productTitle').text($('#product_id option:selected').text());
                
                // Update Badge
                if (txnType === 'sale') {
                    $('#typeBadge').html('<span class="badge bg-success">Showing Sales Only</span>');
                } else if (txnType === 'purchase') {
                    $('#typeBadge').html('<span class="badge bg-danger">Showing Purchases Only</span>');
                } else {
                    $('#typeBadge').html('<span class="badge bg-primary">Showing All Transactions</span>');
                }

                // Sort data by date for the trend
                filteredData.sort((a, b) => new Date(a.date) - new Date(b.date));

                if (priceChart) {
                    priceChart.destroy();
                }

                const ctx = document.getElementById('priceChart').getContext('2d');
                priceChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: filteredData.map(d => `${d.date} (${d.party})`),
                        datasets: [
                            {
                                label: 'Volume (KG)',
                                data: filteredData.map(d => d.qty),
                                backgroundColor: filteredData.map(d => d.type === 'sale' ? 'rgba(25, 135, 84, 0.7)' : 'rgba(220, 53, 69, 0.7)'),
                                borderColor: filteredData.map(d => d.type === 'sale' ? '#198754' : '#dc3545'),
                                borderWidth: 1,
                                rates: filteredData.map(d => d.rate),
                                cps: filteredData.map(d => d.cp)
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { color: '#b0c4de', font: { size: 10 } }
                            },
                            y: {
                                title: { display: true, text: 'Volume (KG)', color: '#fff' },
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#b0c4de' },
                                grace: '15%' // Add extra space at the top to prevent labels from trimming
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    afterBody: function(context) {
                                        const idx = context[0].dataIndex;
                                        const d = filteredData[idx];
                                        return `SP Rate: ₹${d.rate.toLocaleString()}/kg\nCP Rate: ₹${d.cp.toLocaleString()}/kg\nTotal SP: ₹${(d.rate * d.qty).toLocaleString()}\n\nClick to view details`;
                                    }
                                }
                            }
                        },
                        onClick: (event, elements) => {
                            if (elements.length > 0) {
                                const idx = elements[0].index;
                                const d = filteredData[idx];
                                if (d.type === 'sale') {
                                    window.location.href = `/sales/${d.id}/edit`;
                                } else {
                                    window.location.href = `/purchase/${d.id}/edit`;
                                }
                            }
                        },
                        onHover: (event, elements) => {
                            event.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default';
                        }
                    },
                    plugins: [{
                        id: 'barLabels',
                        afterDatasetsDraw(chart) {
                            const {ctx, data} = chart;
                            ctx.save();
                            ctx.textAlign = 'center';

                            chart.getDatasetMeta(0).data.forEach((bar, index) => {
                                const rate = data.datasets[0].rates[index];
                                const cp = data.datasets[0].cps[index];
                                
                                // Draw Rate on top
                                ctx.textBaseline = 'bottom';
                                ctx.font = 'bold 12px sans-serif';
                                ctx.fillStyle = '#fff';
                                ctx.fillText(`₹${rate}`, bar.x, bar.y - 5);

                                // Draw CP in the middle
                                if (bar.height > 20) { // Only draw if bar is tall enough
                                    ctx.textBaseline = 'middle';
                                    ctx.font = 'normal 10px sans-serif';
                                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                                    ctx.fillText(`CP: ₹${cp}`, bar.x, bar.y + (bar.height / 2));
                                }
                            });
                            ctx.restore();
                        }
                    }]
                });
            });
    }

    $('#product_id, #client_id, #vendor_name, #txn_type').on('change', updateChart);
});
</script>
{% endblock %}
